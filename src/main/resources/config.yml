# CBDCore 설정 파일

# 설정 파일 구조 버전입니다. 직접 수정하지 마세요.
config-version: 4

# 서버 목록(멀티플레이 화면)에 표시되는 MOTD 설정
motd:
  enabled: true
  # 각 줄을 기본 폰트 너비 기준으로 가운데 정렬합니다. (근사치)
  center: true
  # 가운데 정렬 시 기준이 되는 대상 너비(px, 기본값). 줄마다 width를 따로 지정하지 않으면 이 값이 사용됩니다.
  target-width: 240
  # '&' 색상/서식 코드, '&#RRGGBB' 헥스 코드, MiniMessage 태그를 함께 사용할 수 있습니다.
  # 그라데이션 예시: <gradient:#ff8ec7:#a0d8ff>텍스트</gradient>
  # 최대 2줄까지 표시됩니다.
  # 각 줄은 일반 문자열이거나, 그 줄만 다른 정렬 너비를 쓰고 싶을 때
  # "text"/"width"를 가진 항목으로 적을 수 있습니다. (아래 예시 참고)
  lines:
    - "<gradient:#ff8ec7:#a0d8ff><b>벚꽃당</b></gradient> &f- CBD 서버"
    - text: "&7즐거운 플레이 되세요!"
      width: 240

# 서버 목록에 표시되는 서버 아이콘(64x64 png) 설정
# icon.png는 기본 제공되지 않으므로, plugins/CBDCore 폴더에 파일을 넣고
# enabled를 true로 바꾸거나 /cbdcore icon <파일명> 명령어를 사용하세요.
icon:
  enabled: false
  # 플러그인 데이터 폴더(plugins/CBDCore) 기준 상대 경로
  file: "icon.png"

# 인게임 채팅/접속·퇴장을 디스코드 채널로 중계하고, 디스코드 채팅을 인게임으로 중계받습니다.
# 게임 -> 디스코드: webhook-url만으로 동작합니다. (채널 설정 > 연동 > 웹훅 > 새 웹훅 만들기 > URL 복사)
# 디스코드 -> 게임: 추가로 bot-token이 필요합니다. Discord Developer Portal에서 봇을 만들고,
#   Bot 탭에서 "MESSAGE CONTENT INTENT"를 켠 뒤, 토큰을 발급받아 아래 bot-token에 붙여넣고,
#   그 봇을 webhook-url과 같은 채널을 볼 수 있는 권한으로 서버에 초대해야 합니다.
#   bot-token이 비어있으면 디스코드 -> 게임 중계는 자동으로 꺼집니다.
discord:
  enabled: false
  webhook-url: ""
  bot-token: ""
  # 채팅 메시지를 보낼 때 플레이어의 얼굴 이미지를 아바타로 표시합니다. %uuid%는 자동 치환됩니다.
  # 비워두면 웹훅 기본 아바타를 사용합니다.
  avatar-url: "https://mc-heads.net/avatar/%uuid%/100"
  chat:
    enabled: true
  join-leave:
    enabled: true
    join-format: "%player% 님이 접속했습니다."
    leave-format: "%player% 님이 퇴장했습니다."
    # 접속/퇴장 임베드 좌측 색상 (#RRGGBB). 비워두면 디스코드 기본 초록/빨강을 사용합니다.
    join-color: "#57F287"
    leave-color: "#ED4245"
